includes:
  - ../../../model/qwen2_5_7b_instruct.yaml
  - ../../../data/real_pilot.yaml
  - ../../../train/default.yaml
  - ../../../eval/default.yaml
  - ../../../runtime/gpu_a100_batch28.yaml

run:
  experiment_name: exp_train
  mode: train
  method: our_method
  seed: 17
  variant_name: g3a-v3-qwen7b-margin-block-scale

data:
  name: real-pilot-compiled-c3-g3a-v3
  carrier_catalog_path: configs/data/frozen/real_pilot_catalog__qwen2_5_7b_compiled__v1.yaml

train:
  target_mode: compiled_fieldwise_bucket_mass
  objective: margin_aware_bucket_mass
  batch_size: 1
  epochs: 96
  learning_rate: 3.0e-5
  lambda_set: 2.0
  lambda_margin: 0.5
  margin_gamma: 1.0
  lambda_reg: 0.0
  evidence_loss_normalization: per_slot_mean
  checkpoint_selection_metric: training_total_evidence_loss_mean
  checkpoint_selection_mode: min
  checkpoint_selection_use_best_for_eval: true
  checkpoint_selection_save_best: true
  probe_block_count: 2
  adapter_mode: lora
  lora_r: 16
  lora_alpha: 64
  lora_dropout: 0.0
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  probe_payload_texts: ["U00", "U01", "U02", "U03", "U04", "U05", "U06", "U07", "U08", "U09", "U10", "U11", "U12", "U13", "U14", "U15"]
  generation_prompt: "Select exactly one allowed carrier token."
  generation_do_sample: false
  generation_max_new_tokens: 1
  generation_stop_strings: []
  generation_bad_words: []
  generation_suppress_tokens: []
  generation_sequence_bias: {}

eval:
  verification_mode: canonical_render
  render_format: canonical_v1
  payload_text: U00
