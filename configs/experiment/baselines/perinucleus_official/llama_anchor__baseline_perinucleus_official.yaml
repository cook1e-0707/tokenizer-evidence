schema_name: baseline_perinucleus_llama_anchor
schema_version: 1
package_name: baseline_perinucleus_llama_anchor
status: anchor_pending

official_repo:
  url: https://github.com/SewoongLab/scalable-fingerprinting-of-llms
  local_path: external_baselines/scalable_fingerprinting_official
  commit_hash: fdceaba14bd3e89340916a6a40e27c945d48460e
  license: MIT

compatibility_patches:
  generation_key_max_new_tokens:
    enabled: true
    file: generate_finetuning_data.py
    before_regex: 'key_all = pipeline\(first_token_key, max_length=key_length\+12\*use_instruction_tuned_model\+1, temperature=temperature, batch_size=batch_size, truncation=True\).*?# 12 is the length of the instruction[^\n]*'
    after: 'key_all = pipeline(first_token_key, max_new_tokens=key_length, temperature=temperature, batch_size=batch_size, truncation=True)   # Compatibility: modern Transformers rejects max_length <= prompt length.'
    reason: 'Current Transformers rejects the official legacy max_length call when the generated prompt token length reaches the total max_length; max_new_tokens preserves the intended key-token generation budget.'
  generation_response_max_new_tokens:
    enabled: true
    file: generate_finetuning_data.py
    before_regex: "response_all = pipeline\\(first_token_response, max_length=response_length\\+12\\*use_instruction_tuned_model\\+1, temperature=temperature, batch_size=batch_size, truncation=True\\)\\n\\s*except Exception as e:\\n\\s*try:\\n\\s*response_all = pipeline\\(first_token_response, max_length=response_length\\+12\\*use_instruction_tuned_model\\+2, temperature=temperature, batch_size=batch_size, truncation=True\\)\\n\\s*except Exception as e:\\n\\s*response_all = pipeline\\(first_token_response, max_length=response_length\\+12\\*use_instruction_tuned_model\\+3, temperature=temperature, batch_size=batch_size, truncation=True\\)"
    after: |2-
      response_all = pipeline(first_token_response, max_new_tokens=response_length, temperature=temperature, batch_size=batch_size, truncation=True)
                  except Exception as e:
                      try:
                          response_all = pipeline(first_token_response, max_new_tokens=response_length+1, temperature=temperature, batch_size=batch_size, truncation=True)
                      except Exception as e:
                          response_all = pipeline(first_token_response, max_new_tokens=response_length+2, temperature=temperature, batch_size=batch_size, truncation=True)
    reason: 'Current Transformers rejects the official legacy max_length fallback for short base-model prompts; max_new_tokens preserves the intended response-token generation budget used only to seed key files before Perinucleus response selection.'
  peft_lora_task_type:
    enabled: true
    file: finetune_multigpu.py
    before: 'task_type="lm"'
    after: 'task_type="CAUSAL_LM"'
    reason: 'Current PEFT rejects the official legacy LoRA task_type="lm"; CAUSAL_LM is the causal-LM equivalent.'
  deepspeed_disable_cpu_offload:
    enabled: true
    file: finetune_multigpu.py
    before: "                                                    'offload_optimizer': {'device': 'cpu', 'pin_memory': True},\n                                                    'offload_param': {'device': 'cpu', 'pin_memory': True},\n"
    after: "                                                    # Smoke compatibility: CPU offload triggers DeepSpeed CPUAdam JIT compilation.\n"
    reason: 'Chimera exposes CUDA 10.1 to DeepSpeed JIT while PyTorch is compiled with CUDA 12.1; disabling CPU offload avoids CPUAdam compilation for the LoRA anchor.'
  accelerate_skip_tokenizer_unwrap:
    enabled: true
    file: finetune_multigpu.py
    before: "        tokenizer = trainer.accelerator.unwrap_model(tokenizer)\n"
    after: "        # Smoke compatibility: tokenizer is not a torch module and must not be passed to accelerator.unwrap_model.\n"
    reason: 'Current Accelerate unwrap_model expects a torch module and fails on tokenizer objects after training; saving the tokenizer directly is equivalent.'
  eval_utility_load_lora_adapter:
    enabled: true
    file: eval_utility.py
    before: "            model_args=f\"pretrained={model_path},local_files_only=True,trust_remote_code=True\",\n"
    after: "            model_args=(f\"pretrained={config.get('model_path', model_path)},peft={model_path},local_files_only=True,trust_remote_code=True\" if os.path.exists(os.path.join(model_path, \"adapter_config.json\")) else f\"pretrained={model_path},local_files_only=True,trust_remote_code=True\"),\n"
    reason: 'LoRA anchor saves a PEFT adapter directory; lm_eval must load the base model plus peft adapter instead of treating the adapter directory as a standalone HF model.'
  eval_utility_tiny_only_total_accuracy:
    enabled: true
    file: eval_utility.py
    before_regex: "            for metric in all_datasets\\[ds\\]\\['metric'\\]:\\n                if wandb_run_name != 'None':\\n                    try:\\n                        wandb\\.log\\(\\{f\"eval/detailed/\\{ds\\}/\\{task\\}/\\{metric\\}\": task_res\\[f\"\\{metric\\}\"\\]\\}\\)\\n                        total_acc \\+= task_res\\[f\"\\{metric\\}\"\\]\\n                        total_tasks \\+= 1\\n                    except KeyError:\\n                        try:\\n                            wandb\\.log\\(\\{f\"eval/detailed/\\{ds\\}/\\{task\\}/\\{metric\\}\": task_res\\[f\"\\{metric\\},none\"\\]\\}\\)\\n                            total_acc \\+= task_res\\[f\"\\{metric\\},none\"\\]\\n                            total_tasks \\+= 1\\n                        except KeyError:\\n                            print\\(f\"Could not find metric \\{metric\\} for task \\{task\\}\"\\)\\n                            continue\\n    total_acc /= total_tasks"
    after: |2-
                  for metric in all_datasets[ds]['metric']:
                      try:
                          metric_value = task_res[f"{metric}"]
                      except KeyError:
                          try:
                              metric_value = task_res[f"{metric},none"]
                          except KeyError:
                              print(f"Could not find metric {metric} for task {task}")
                              continue
                      total_acc += metric_value
                      total_tasks += 1
                      if wandb_run_name != 'None':
                          wandb.log({f"eval/detailed/{ds}/{task}/{metric}": metric_value})
          total_acc = total_acc / total_tasks if total_tasks else float("nan")
    reason: 'Official eval_utility.py only accumulated total_tasks inside the wandb logging branch; tinyBenchmarks with default wandb_run_name=None saved valid eval_results_tiny.json but crashed on total_acc /= 0.'

anchor:
  scratch_root: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_llama_anchor
  model: meta-llama/Meta-Llama-3.1-8B
  model_family: llama
  model_size: 8B
  seed: 17
  key_length: 16
  response_length: 1
  generation_batch_size: 1
  nucleus_t: 0.8
  nucleus_k: 3
  use_chat_template: false
  train_epochs: 40
  learning_rate: 5.0e-5
  batch_size: 1
  use_lora: true
  lora_rank: 64
  lora_alpha_ratio: 2.0
  forgetting_regularizer_strength: 0.0
  benign_proportion: 0.0
  deepspeed_num_gpus: 1
  deepspeed_master_port: 29531
  run_utility: true
  utility_tiny_benchmarks: true
  eval_batch_size: 4
  stages:
    - name: anchor16
      num_fingerprints: 16
      train_epochs: 40
    - name: anchor64
      num_fingerprints: 64
      train_epochs: 40
    - name: anchor128
      num_fingerprints: 128
      train_epochs: 40

repo_outputs:
  protocol_doc: docs/baseline_perinucleus_llama_anchor_protocol.md
