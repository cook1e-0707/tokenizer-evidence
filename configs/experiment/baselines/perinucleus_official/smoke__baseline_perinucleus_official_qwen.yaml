schema_name: baseline_perinucleus_official_smoke
schema_version: 1
package_name: baseline_perinucleus_official_smoke
status: smoke_pending

official_repo:
  url: https://github.com/SewoongLab/scalable-fingerprinting-of-llms
  local_path: external_baselines/scalable_fingerprinting_official
  commit_hash: fdceaba14bd3e89340916a6a40e27c945d48460e
  license: MIT

compatibility_patches:
  peft_lora_task_type:
    enabled: true
    file: finetune_multigpu.py
    before: 'task_type="lm"'
    after: 'task_type="CAUSAL_LM"'
    reason: 'Current PEFT rejects the official legacy LoRA task_type="lm"; CAUSAL_LM is the causal-LM equivalent.'
  deepspeed_disable_cpu_offload:
    enabled: true
    file: finetune_multigpu.py
    before: "                                                    'offload_optimizer': {'device': 'cpu', 'pin_memory': True},\n                                                    'offload_param': {'device': 'cpu', 'pin_memory': True},\n"
    after: "                                                    # Smoke compatibility: CPU offload triggers DeepSpeed CPUAdam JIT compilation.\n"
    reason: 'Chimera exposes CUDA 10.1 to DeepSpeed JIT while PyTorch is compiled with CUDA 12.1; disabling CPU offload avoids CPUAdam compilation for the tiny LoRA smoke.'

smoke:
  scratch_root: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_official_smoke
  model: Qwen/Qwen2.5-7B-Instruct
  model_family: qwen
  model_size: 7B
  seed: 17
  num_fingerprints: 16
  key_length: 16
  response_length: 1
  num_responses_per_fingerprint: 1
  key_response_strategy: perinucleus
  nucleus_t: 0.8
  nucleus_k: 3
  use_chat_template: true
  train_epochs: 1
  learning_rate: 5.0e-5
  batch_size: 1
  use_lora: true
  lora_rank: 8
  lora_alpha_ratio: 2.0
  forgetting_regularizer_strength: 0.0
  benign_proportion: 0.0
  deepspeed_num_gpus: 1
  deepspeed_master_port: 29517
  run_utility: true
  utility_tiny_benchmarks: true
  eval_batch_size: 4
  create_venv: false
  venv_path: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_official_smoke/venv
  install_requirements: false

repo_outputs:
  result_doc: docs/baseline_perinucleus_official_smoke_result.md
  table: results/tables/baseline_perinucleus_official_smoke.csv
  summary: results/processed/paper_stats/baseline_perinucleus_official_smoke_summary.json
  compute: results/processed/paper_stats/baseline_perinucleus_official_smoke_compute.json
