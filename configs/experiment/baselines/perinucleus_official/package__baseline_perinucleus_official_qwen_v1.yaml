version: 1
workstream: B1-strong-external-baseline-official
package_name: baseline_perinucleus_official_qwen_v1
description: Official-code Scalable Fingerprinting / Perinucleus trained baseline with a frozen Qwen LoRA adaptation candidate.
status: qwen_candidate_frozen_pending_final_protocol
official_source:
  paper: Scalable Fingerprinting of Large Language Models
  paper_url: https://arxiv.org/abs/2502.07760
  openreview_url: https://openreview.net/forum?id=CRyOyiVvvJ
  repo_url: https://github.com/SewoongLab/scalable-fingerprinting-of-llms
  local_clone: external_baselines/scalable_fingerprinting_official
  commit_hash: fdceaba14bd3e89340916a6a40e27c945d48460e
  license: MIT
  dependency_file: requirements.txt
  scripts:
    fingerprint_generation: generate_finetuning_data.py
    finetune: finetune_multigpu.py
    check: check_fingerprints.py
    utility: eval_utility.py
scratch_root_required: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_official
chimera_environment_setup: |
  source ~/.bashrc
  source /hpcstor6/scratch01/g/guanjie.lin001/venvs/zkrfa_py312/bin/activate
  export HF_HOME=/hpcstor6/scratch01/g/guanjie.lin001/huggingface
  export TRANSFORMERS_CACHE=/hpcstor6/scratch01/g/guanjie.lin001/huggingface
  export HF_TOKEN="$(tr -d '\r\n' </hpcstor6/scratch01/g/guanjie.lin001/keys/hf_token)"
  export WANDB_MODE=disabled
  export TOKENIZERS_PARALLELISM=false
  export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
repo_outputs:
  protocol: docs/baseline_perinucleus_official_protocol.md
  smoke: docs/baseline_perinucleus_official_smoke.md
  llama_anchor: docs/baseline_perinucleus_llama_anchor_result.md
  qwen_capacity_sweep: docs/baseline_perinucleus_qwen_capacity_sweep.md
  qwen_candidate_utility: docs/baseline_perinucleus_qwen_candidate_utility.md
  qwen_candidate_freeze: docs/baseline_perinucleus_qwen_candidate_freeze.md
  frozen_candidate_config: configs/experiment/baselines/perinucleus_official/qwen_frozen_candidate__baseline_perinucleus_official.yaml
  qwen_final_protocol: docs/baseline_perinucleus_official_qwen_final_protocol.md
  qwen_final_manifest: manifests/baseline_perinucleus_official_qwen_final/eval_manifest.json
  qwen_final_package_dry_run: results/processed/paper_stats/baseline_perinucleus_official_qwen_final_package_dry_run.json
  qwen_final_cases: results/tables/baseline_perinucleus_official_qwen_final_cases.csv
  table: results/tables/baseline_perinucleus_official.csv
  summary: results/processed/paper_stats/baseline_perinucleus_official_summary.json
  compute: results/processed/paper_stats/baseline_perinucleus_official_compute.json
hard_gates:
  - no_final_matrix_before_qwen_candidate_freeze
  - no_main_table_claims_from_perinucleus_no_train_diagnostic
  - official_commit_and_license_recorded
  - use_chat_template_for_instruct_models_unless_official_protocol_says_otherwise
  - scratch_only_for_large_checkpoints
  - no_hyperparameter_changes_after_qwen_candidate_freeze
v0_diagnostic:
  renamed_as: perinucleus_no_train_diagnostic
  old_paths_preserved:
    - configs/experiment/baselines/perinucleus/
    - results/tables/baseline_perinucleus.csv
    - results/processed/paper_stats/baseline_perinucleus_summary.json
  main_table_allowed: false
smoke:
  status: superseded_by_forensic_overfit_anchor_and_capacity_gates
  model: Qwen/Qwen2.5-7B-Instruct
  fallback_model: smallest feasible official-compatible causal LM
  seed: 17
  num_fingerprints: 16
  response_length: 1
  key_response_strategy: perinucleus
  nucleus_t: 0.8
  nucleus_k: 3
  use_chat_template: true
  train_epochs: 1
  use_lora: true
  lora_rank: 8
  pass_criteria:
    - fingerprint_checking_above_random_chance
    - fingerprinted_model_differs_from_base_on_fingerprint_responses
    - no_prompt_or_chat_template_mismatch
    - utility_completed_or_limitation_documented
anchor:
  status: passed
  preferred_model_family: llama_family_consistent_with_official_scripts
  fallback_model_family: qwen_with_official_model_path_flags
  required_checker: official_check_fingerprints.py
  result_doc: docs/baseline_perinucleus_llama_anchor_result.md
matched_qwen_final:
  status: candidate_frozen_pending_final_protocol
  backbone: Qwen/Qwen2.5-7B-Instruct
  use_chat_template: true
  frozen_candidate_config: configs/experiment/baselines/perinucleus_official/qwen_frozen_candidate__baseline_perinucleus_official.yaml
  frozen_candidate_summary: results/processed/paper_stats/baseline_perinucleus_qwen_candidate_freeze_summary.json
  frozen_candidate_arm: all_linear_r64_fp64_e80
  frozen_candidate_adapter_path: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_qwen_capacity_sweep/runs/manual_20260429T182756Z/arms/all_linear_r64_fp64_e80/adapter_final
  output_root_base: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_official_qwen
  payloads: ["U00", "U03", "U12", "U15"]
  seeds: [17, 23, 29]
  query_budgets: [1, 3, 5, 10]
  matched_query_budget: 4
  local_files_only: true
  requested_resources:
    partition: pomplun
    qos: pomplun
    gpu_type: h200
    num_gpus: 1
    cpus: 8
    mem_gb: 240
    time_limit: "04:00:00"
  required_metrics:
    - clean_verification_success
    - far
    - utility
    - base_vs_fingerprinted_response_delta
    - failure_cases
