version: 1
workstream: B1-strong-external-baseline-official
package_name: baseline_perinucleus_official_qwen_v1
description: Official-code Scalable Fingerprinting / Perinucleus trained baseline. Full final matrix is blocked until smoke and anchor pass.
status: smoke_pending
official_source:
  paper: Scalable Fingerprinting of Large Language Models
  paper_url: https://arxiv.org/abs/2502.07760
  openreview_url: https://openreview.net/forum?id=CRyOyiVvvJ
  repo_url: https://github.com/SewoongLab/scalable-fingerprinting-of-llms
  local_clone: external_baselines/scalable_fingerprinting_official
  commit_hash: fdceaba14bd3e89340916a6a40e27c945d48460e
  license: MIT
  dependency_file: requirements.txt
  scripts:
    fingerprint_generation: generate_finetuning_data.py
    finetune: finetune_multigpu.py
    check: check_fingerprints.py
    utility: eval_utility.py
scratch_root_required: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_official
repo_outputs:
  protocol: docs/baseline_perinucleus_official_protocol.md
  smoke: docs/baseline_perinucleus_official_smoke.md
  table: results/tables/baseline_perinucleus_official.csv
  summary: results/processed/paper_stats/baseline_perinucleus_official_summary.json
  compute: results/processed/paper_stats/baseline_perinucleus_official_compute.json
hard_gates:
  - no_full_chimera_jobs_before_official_smoke_passes
  - no_main_table_claims_from_perinucleus_no_train_diagnostic
  - official_commit_and_license_recorded
  - use_chat_template_for_instruct_models_unless_official_protocol_says_otherwise
  - scratch_only_for_large_checkpoints
v0_diagnostic:
  renamed_as: perinucleus_no_train_diagnostic
  old_paths_preserved:
    - configs/experiment/baselines/perinucleus/
    - results/tables/baseline_perinucleus.csv
    - results/processed/paper_stats/baseline_perinucleus_summary.json
  main_table_allowed: false
smoke:
  status: not_run
  model: Qwen/Qwen2.5-7B-Instruct
  fallback_model: smallest feasible official-compatible causal LM
  seed: 17
  num_fingerprints: 16
  response_length: 1
  key_response_strategy: perinucleus
  nucleus_t: 0.8
  nucleus_k: 3
  use_chat_template: true
  train_epochs: 1
  use_lora: true
  lora_rank: 8
  pass_criteria:
    - fingerprint_checking_above_random_chance
    - fingerprinted_model_differs_from_base_on_fingerprint_responses
    - no_prompt_or_chat_template_mismatch
    - utility_completed_or_limitation_documented
anchor:
  status: blocked_until_smoke_pass
  preferred_model_family: llama_family_consistent_with_official_scripts
  fallback_model_family: qwen_with_official_model_path_flags
  required_checker: official_check_fingerprints.py
matched_qwen_final:
  status: blocked_until_smoke_and_anchor_pass
  backbone: Qwen/Qwen2.5-7B-Instruct
  use_chat_template: true
  seeds: [17, 23, 29]
  query_budgets: [1, 3, 5, 10]
  required_metrics:
    - clean_verification_success
    - far
    - utility
    - base_vs_fingerprinted_response_delta
    - failure_cases
