schema_name: matched_far_utility_compute_method_plan
schema_version: 1
status: prepared_for_review_do_not_launch
method_id: scalable_fingerprinting_perinucleus_official_qwen_final
display_name: Qwen-adapted official Scalable/Perinucleus
comparison_package: matched_far_utility_compute_v1

decision:
  run_required: true
  reason: Clean success and TinyBench utility sanity exist, but matched FAR/null calibration and normalized compute are incomplete.
  launch_guard: Do not submit any job until docs/far_utility_compute_protocol.md is reviewed and a runner is explicitly approved.

source_artifacts:
  final_summary: results/processed/paper_stats/baseline_perinucleus_official_qwen_final_summary.json
  final_table: results/tables/baseline_perinucleus_official_qwen_final.csv
  frozen_candidate_config: configs/experiment/baselines/perinucleus_official/qwen_frozen_candidate__baseline_perinucleus_official.yaml
  frozen_candidate_summary: results/processed/paper_stats/baseline_perinucleus_qwen_candidate_freeze_summary.json
  capacity_sweep_summary: results/processed/paper_stats/baseline_perinucleus_qwen_capacity_sweep_summary.json
  capacity_sweep_compute: results/processed/paper_stats/baseline_perinucleus_qwen_capacity_sweep_compute.json
  utility_summary: results/processed/paper_stats/baseline_perinucleus_qwen_candidate_utility_summary.json
  utility_compute: results/processed/paper_stats/baseline_perinucleus_qwen_candidate_utility_compute.json
  final_compute: results/processed/paper_stats/baseline_perinucleus_official_qwen_final_compute.json
  baseline_registry: results/tables/baseline_paper_registry.csv

existing_evidence:
  clean_success:
    status: complete
    success_count: 48
    target_count: 48
    success_rate: 1.0
  confidence_interval:
    status: complete_for_clean_success
    ci95_low: 0.9258973488472576
    ci95_high: 0.9999999999999999
  query_budget_grid:
    status: complete_for_clean_success_only
    budgets: [1, 3, 5, 10]
    success_count_per_budget: 12
    target_count_per_budget: 12
  far_null_calibration:
    status: missing
  utility:
    status: complete_tinybench_sanity
    base_total_accuracy: 0.6035317339934293
    adapter_total_accuracy: 0.6191832009104691
    signed_absolute_drop: -0.01565146691703978
  compute:
    status: partial
    selected_arm_train_seconds: 1802.0044560432434
    final_eval_seconds_total: 732.1275956630707
    model_forward_count_total: 228

method_contract:
  official_repo: external_baselines/scalable_fingerprinting_official
  official_commit: fdceaba14bd3e89340916a6a40e27c945d48460e
  base_model: Qwen/Qwen2.5-7B-Instruct
  tokenizer: Qwen/Qwen2.5-7B-Instruct
  use_chat_template: true
  evidence_type: key_response_perinucleus_fingerprint
  adapter_path: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_qwen_capacity_sweep/runs/manual_20260429T182756Z/arms/all_linear_r64_fp64_e80/adapter_final
  fingerprints_file: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_qwen_capacity_sweep/runs/manual_20260429T182756Z/generated/fingerprints_64/fingerprints-perinucleus-Qwen-Qwen2.5-7B-Instruct-nucleus_threshold-0.8-response_length-1-use_chat_template-True.json
  num_fingerprints: 64
  response_length: 1
  lora_rank: 64
  lora_alpha_ratio: 2.0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  epochs_run: 80
  regularization_label: diagnostic_off
  adapter_source_policy: use_exact_frozen_candidate; do_not_retrain_for_this_audit

query_budget_protocol:
  budgets: [1, 3, 5, 10]
  score_name: ownership_score
  score_direction: higher_is_stronger
  aggregation: exact_response_match_ratio_over_first_M_registered_fingerprint_queries
  threshold_policy: freeze_on_calibration_split_before_final_eval
  target_far: 0.01
  note: Existing clean query-budget rows may be reused; FAR rows must be newly computed under the same budgets.

far_protocol:
  calibration_split:
    payloads: ["U01", "U05", "U09", "U13"]
    seed: 41
  final_split:
    payloads: ["U00", "U03", "U12", "U15"]
    seeds: [17, 23, 29]
  null_models:
    - id: base_qwen
      model: Qwen/Qwen2.5-7B-Instruct
      status: required
    - id: unprotected_qwen_finetuned
      model: Qwen/Qwen2.5-7B-Instruct
      status: optional_if_available
      note: Use only if an unprotected instruction-tuned or task-tuned Qwen checkpoint already exists.
    - id: non_qwen_llama3_1_8b
      model: meta-llama/Meta-Llama-3.1-8B-Instruct
      status: optional_if_cached_and_authorized
  null_probe_sets:
    - wrong_payload_null
    - wrong_owner_null
    - non_owner_probe_null
    - organic_prompt_null
  required_outputs:
    - final_observed_far
    - final_far_false_accept_count
    - final_far_negative_count
    - final_far_wilson_low
    - final_far_wilson_high
    - per_budget_far
    - per_null_set_far

utility_protocol:
  benchmark: tinyBenchmarks
  limitation: Existing TinyBench result may be reused if base model, tasks, and evaluator version match the ours run.
  base_model: Qwen/Qwen2.5-7B-Instruct
  adapter_selection:
    policy: evaluate_frozen_candidate_adapter_once
    adapter_path: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/baselines/perinucleus_qwen_capacity_sweep/runs/manual_20260429T182756Z/arms/all_linear_r64_fp64_e80/adapter_final
  report:
    - base_total_accuracy
    - adapter_total_accuracy
    - absolute_drop
    - ci95_if_available
  max_absolute_drop: 0.05

compute_protocol:
  requested_resources:
    partition: DGXA100
    num_gpus: 1
    cpus: 16
    mem_gb: 120
    time_limit: "04:00:00"
  report:
    - train_wall_clock_seconds
    - eval_wall_clock_seconds
    - utility_wall_clock_seconds
    - requested_gpu_hours
    - actual_gpu_seconds_if_available
    - trainable_parameters
    - training_examples
    - eval_query_count
    - adapter_artifact_size_bytes
  fallback_policy: Use capacity-sweep selected-arm seconds for train_wall_clock_seconds only if no final-protocol train rerun is performed.

repo_outputs:
  summary: results/processed/paper_stats/matched_far_utility_compute_perinucleus_summary.json
  far_cases: results/tables/matched_far_utility_compute_perinucleus_far_cases.csv
  utility: results/tables/matched_far_utility_compute_perinucleus_utility.csv
  compute: results/processed/paper_stats/matched_far_utility_compute_perinucleus_compute.json
  log_dir: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/comparison/far_utility_compute/perinucleus/logs

runtime:
  scratch_root: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/comparison/far_utility_compute/perinucleus
  local_files_only: true
  trust_remote_code: true
  wandb_mode: disabled
