includes:
  - ../../model/qwen2_5_7b_instruct.yaml
  - ../../data/real_pilot.yaml
  - ../../train/default.yaml
  - ../../eval/default.yaml
  - ../../runtime/gpu_a100_batch28.yaml

run:
  experiment_name: exp_train
  mode: train
  method: our_method
  seed: 17
  variant_name: batch28b-foundation

data:
  name: real-pilot-foundation
  carrier_catalog_path: configs/data/frozen/real_pilot_catalog__qwen2_5_7b_foundation__v1.yaml

train:
  target_mode: foundation_fieldwise_constrained_slot_completion
  batch_size: 1
  epochs: 16
  learning_rate: 1.0e-4
  adapter_mode: lora
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  probe_block_count: 1
  probe_payload_texts:
    - "AA"
    - "AB"
    - "AC"
    - "AD"
    - "AE"
    - "AF"
    - "AG"
    - "AH"
    - "BA"
    - "BB"
    - "BC"
    - "BD"
    - "BE"
    - "BF"
    - "BG"
    - "BH"
  generation_prompt: ""
  generation_do_sample: false
  generation_max_new_tokens: 1

eval:
  verification_mode: canonical_render
  render_format: canonical_v1
  payload_text: AA
