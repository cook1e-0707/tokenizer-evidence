protocol:
  id: natural_evidence_v1
  version: 1
  audit_key_status: hidden_until_transcript_commitment
  verifier_spec: public_after_commit
  commitment:
    required: true
    document: docs/natural_evidence_v1/protocol_commitment.md
    pre_audit_fields:
      - protocol_id
      - protocol_version
      - audit_key_commitment
      - payload_commitment
      - bucket_policy_commitment
      - query_budget
      - probe_selection_rule
      - model_arm_set
      - decoder_config
    transcript_freeze_before_key_reveal: true
    forbid_post_hoc_key_search: true
    multiple_testing_accounting_required: true
  result_status_for_unrun_metrics: NEEDS_RESULTS
  forbidden_surface_patterns:
    - "FIELD="
    - "SECTION="
    - "TOPIC="
    - "OWNER"
    - "PAYLOAD"
    - "CERT"
    - "EVIDENCE"
    - "CARRIER"

models:
  qwen:
    family: qwen2.5
    model_name: Qwen/Qwen2.5-7B-Instruct
    tokenizer_name: Qwen/Qwen2.5-7B-Instruct
  llama:
    family: llama3.1
    model_name: meta-llama/Meta-Llama-3.1-8B-Instruct
    tokenizer_name: meta-llama/Meta-Llama-3.1-8B-Instruct

arms:
  - arm_id: qwen_protected
    model_family: qwen2.5
    model_condition: protected_trained
    tokenizer: Qwen/Qwen2.5-7B-Instruct
    training_required: true
  - arm_id: qwen_raw
    model_family: qwen2.5
    model_condition: raw
    tokenizer: Qwen/Qwen2.5-7B-Instruct
    training_required: false
  - arm_id: qwen_task_only_lora
    model_family: qwen2.5
    model_condition: task_only_lora
    tokenizer: Qwen/Qwen2.5-7B-Instruct
    training_required: true
    bucket_mass_loss: false
  - arm_id: llama_protected
    model_family: llama3.1
    model_condition: protected_trained
    tokenizer: meta-llama/Meta-Llama-3.1-8B-Instruct
    training_required: true
  - arm_id: llama_raw
    model_family: llama3.1
    model_condition: raw
    tokenizer: meta-llama/Meta-Llama-3.1-8B-Instruct
    training_required: false
  - arm_id: llama_task_only_lora
    model_family: llama3.1
    model_condition: task_only_lora
    tokenizer: meta-llama/Meta-Llama-3.1-8B-Instruct
    training_required: true
    bucket_mass_loss: false

null_evaluations:
  required:
    - raw_exact_model
    - task_only_lora
    - wrong_key
    - wrong_payload
    - same_family_raw_near_null
    - organic_prompts
    - non_owner_prompts
  same_family_raw_near_null:
    qwen:
      - Qwen/Qwen2.5-3B-Instruct
      - Qwen/Qwen2.5-7B-Instruct
      - Qwen/Qwen2.5-14B-Instruct
    llama:
      - meta-llama/Meta-Llama-3.1-8B-Instruct
  wrong_key_count: 4
  wrong_payload_count: 4

bucket_bank:
  # Build/scaling placeholder for static raw opportunity banks. This is not a
  # training-start gate and must not be compared to Scalable Fingerprinting's
  # 24,576 implanted fingerprint identities.
  target_bank_entries_per_tokenizer: 24000
  candidate_top_k: 64
  bucket_count: 8
  bucket_assignment: keyed_mass_balance
  min_reference_probability: 0.0001
  min_members_per_bucket: 2
  min_bucket_mass: 0.01
  strict_min_bucket_mass: false
  strict_balance_gate: false
  max_evidence_positions_per_response: 4
  min_spacing_tokens: 12
  output_root: results/natural_evidence_v1/bucket_banks
  reference_candidates:
    qwen: results/natural_evidence_v1/reference_candidates/qwen_topk_candidates.jsonl
    llama: results/natural_evidence_v1/reference_candidates/llama_topk_candidates.jsonl
  filters:
    stable_single_token: true
    no_delimiter_like_tokens: true
    no_control_tokens: true
    no_obvious_evidence_tokens: true
    no_rare_unicode_artifacts: true
    reject_pure_whitespace: true
    allow_leading_space_word_tokens: true
    reject_special_token_surfaces: true
    reject_markdown_or_path_like_surfaces: true
  quality_gates:
    train_gate_required: true
    raw_entry_count_is_training_gate: false
    raw_opportunity_entries_scaling_placeholder: 24000
    heldout_eligible_density_status: NEEDS_RESULTS
    reconstructability_rate_min: 0.95
    min_bucket_mass: 0.005
    max_bucket_mass_ratio: 5.0
    min_bucket_entropy_fraction: 0.90
    counterfactual_suffix_delta_nll_max: TODO_AFTER_COMPATIBILITY_SCORING
    bucket_count_ablation_required:
      - 4
      - 8
    raw_wrong_key_null_required: true
  compatibility_adjusted_capacity:
    primary_metric: effective_compatible_bits_per_response
    raw_entry_count_is_training_gate: false
    diagnostic_high_risk_gate:
      bucket_count: 4
      min1_compatible_entries_min: 1500
      fully_compatible_min2_entries_min: 200
      heldout_eligible_positions_per_100_tokens_min: 0.3
      effective_compatible_bits_per_response_min: 0.3
      raw_wrong_key_pre_null_required: true
      invalid_suffix_policy: explain_or_exclude
      paper_claim_allowed: false
      allowed_after_paper_ready_density_fail: true
    qwen_e2e_viability_gate:
      gate_role: paper_ready_minimum
      bucket_count: 4
      min1_compatible_entries_min: 1500
      min1_compatible_entries_target: 2500
      fully_compatible_min2_entries_min: 200
      heldout_eligible_positions_per_100_tokens_min: 0.5
      effective_compatible_bits_per_response_min: 1.0
      raw_wrong_key_pre_null_required: true
    main_paper_target:
      compatibility_aware_entries_min: 5000
      compatibility_aware_entries_target: 10000
      multi_member_compatible_subset_min: 1000
    oral_aspiration:
      compatibility_aware_entries_min: 10000
      raw_opportunity_scaling_curve:
        - 10000
        - 20000
        - 24000
  compatibility_sweep:
    delta_nll_per_token_thresholds:
      - 0.05
      - 0.1
      - 0.2
      - 0.3
    delta_nll_raw_thresholds:
      - 0.5
      - 1.0
      - 1.5
      - 2.0
    delta_nll_thresholds:
      - 0.05
      - 0.1
      - 0.2
      - 0.3
    bucket_counts:
      - 2
      - 4
      - 8
    primary_bucket_counts:
      - 2
      - 4
    deferred_bucket_counts:
      - 8
    candidate_top_k:
      - 64
      - 128
      - 256

selector:
  type: keyed_prefix_selector
  audit_key_id: K001
  min_spacing_tokens: 12
  max_evidence_positions_per_response: 4
  prefix_inputs:
    - prompt_id
    - prefix_token_ids
    - protocol_id
    - tokenizer_name

decoder:
  bucket_tuple_width: 3
  bucket_radix: 8
  rs_parity_symbols: 0
  accept_rule: recovered_payload_equals_committed_payload

payloads:
  - payload_id: P0421
    payload_text: P0421
  - payload_id: P1729
    payload_text: P1729

pilot_scale:
  payloads: 2
  seeds:
    - 17
    - 23
  train_prompts_per_protected_model: 8192
  eval_owner_probes: 2048
  organic_null_prompts: 2048
  query_budgets:
    - 8
    - 16
    - 32
    - 64
    - 128

diagnostic_high_risk_pilot_scale:
  status: diagnostic_high_risk
  paper_claim_allowed: false
  payload_bits:
    min: 16
    max: 32
  payloads: 2
  seeds:
    - 17
    - 23
  eval_owner_probes: 2048
  organic_null_prompts: 2048
  query_budgets:
    - 64
    - 128
    - 256
    - 512

full_matrix_scale:
  payloads: 4
  seeds:
    - 17
    - 23
    - 29
  prompt_families:
    - PF1
    - PF2
    - PF3
    - PF4
  eval_owner_probes_per_cell: 2048
  organic_null_prompts_per_model: 4096
  query_budgets:
    - 8
    - 16
    - 32
    - 64
    - 128

training:
  target_mode: natural_transcript_bucket_mass
  start_condition: after_basic_4way_gate_passes
  adapter:
    type: lora
    r: 16
    alpha: 32
    dropout: 0.0
  losses:
    task_loss: true
    bucket_mass_loss: true
    kl_reference_loss: optional
    eligible_position_exact_token_ce: masked
  notes: >
    Do not reuse the exact-slot 64-epoch envelope. Use max_steps or epochs scaled
    to the natural response dataset size.

attacks:
  - no_attack
  - generic_paraphrase
  - style_normalization
  - compression_summarization
  - low_temperature_regeneration
  - deterministic_rewrite
  - suffix_truncation
  - public_surface_scrub
  - oracle_keyed_sanitizer
  - public_no_key_sanitizer

end_to_end_pilot:
  qwen_first: true
  primary_bucket_count: 4
  secondary_bucket_count: 8
  diagnostic_high_risk_allowed: true
  diagnostic_high_risk_claim_status: forbidden_from_paper_claims
  paper_ready_density_gate_remains_required: true
  llama_start_condition: qwen_diagnostic_recovery_plus_null_rejection_reviewed
  full_matrix_start_condition: paper_ready_qwen_and_llama_reviewed
  required_conditions:
    - protected_trained
    - raw
    - task_only_lora
    - wrong_key
    - wrong_payload
  diagnostic_required_conditions:
    - protected_trained
    - raw
    - task_only_lora
    - wrong_key
    - wrong_payload
  diagnostic_bank:
    primary: qwen_4way_min1_compatible
    fallback: qwen_2way_if_available
    forbid_8way_main: true
    forbid_llama: true
    forbid_full_matrix: true
  minimum_eval_owner_probes: 2048
  minimum_organic_null_prompts: 2048
  diagnostic_query_budgets:
    - 64
    - 128
    - 256
    - 512
  diagnostic_required_outputs:
    - full_transcript
    - eligible_positions
    - bucket_observations
    - erasures
    - symbol_errors
    - rs_decode_trace
  success_gates:
    protected_payload_recovery: NEEDS_RESULTS
    raw_exact_model_reject: NEEDS_RESULTS
    task_only_lora_reject: NEEDS_RESULTS
    wrong_key_reject: NEEDS_RESULTS
    wrong_payload_reject: NEEDS_RESULTS
    same_family_raw_reject: NEEDS_RESULTS
    utility_naturalness_bounds: NEEDS_RESULTS

tables:
  required_columns:
    - model_family
    - model_condition
    - tokenizer
    - bucket_bank_id
    - payload_id
    - seed
    - query_budget
    - accepted
    - recovered_payload
    - far_family
    - utility_metric
    - naturalness_metric
    - protocol_id
  outputs:
    bucket_bank_coverage: results/natural_evidence_v1/tables/bucket_bank_coverage.csv
    bucket_bank_coverage_by_split: results/natural_evidence_v1/tables/bucket_bank_coverage_by_split.csv
    bucket_bank_balance: results/natural_evidence_v1/tables/bucket_bank_balance.csv
    natural_channel_capacity: results/natural_evidence_v1/tables/natural_channel_capacity.csv
    reconstructability_report: results/natural_evidence_v1/tables/reconstructability_report.csv
    four_arm_recovery: results/natural_evidence_v1/tables/four_arm_recovery.csv
    far_by_query_budget: results/natural_evidence_v1/tables/far_by_query_budget.csv
    naturalness_utility: results/natural_evidence_v1/tables/naturalness_utility.csv
    sanitizer_attacks: results/natural_evidence_v1/tables/sanitizer_attacks.csv
    structured_vs_natural_comparison: results/natural_evidence_v1/tables/structured_vs_natural_comparison.csv
    compute_accounting: results/natural_evidence_v1/tables/compute_accounting.csv
