version: 1
workstream: R1
description: Minimal second-family clean-path replication on Llama 3.1 8B Instruct with a Llama-tokenizer frozen carrier catalog.
train_config: configs/experiment/scale/r1/exp_train__llama3_1_8b__r1_replication_v1.yaml
eval_config: configs/experiment/scale/r1/exp_eval__llama3_1_8b__r1_replication_v1.yaml
new_case_root_prefix: r1_llama3_1_8b_replication_v1
case_root_search_roots:
  - ${EXP_SCRATCH}
  - ${REPO_HOME}
scratch_root_required: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/r1_llama3_1_8b_replication_v1
chimera_environment_setup: |
  if [ -f /etc/profile ]; then . /etc/profile; fi
  source /hpcstor6/scratch01/g/guanjie.lin001/venvs/zkrfa_py312/bin/activate
  export HF_HOME=/hpcstor6/scratch01/g/guanjie.lin001/huggingface
  export HF_TOKEN="$(tr -d '\r\n' </hpcstor6/scratch01/g/guanjie.lin001/keys/hf_token)"
catalog_prerequisite:
  source_catalog: configs/data/source/real_pilot_catalog__llama3_1__src_v1.yaml
  frozen_catalog: configs/data/frozen/real_pilot_catalog__llama3_1__v1.yaml
  audit_report: results/processed/paper_stats/r1_llama3_1_catalog_freeze_audit.json
  change_log: docs/catalog_freezes/real_pilot_catalog__llama3_1__v1.md
  status: required_before_train
  rationale: R1 must use a Llama-tokenizer strict-pass catalog; reusing the Qwen catalog would not test cross-family/tokenizer generalization.
fixed_contract:
  model: meta-llama/Meta-Llama-3.1-8B-Instruct
  tokenizer: meta-llama/Meta-Llama-3.1-8B-Instruct
  block_count: 2
  fields_per_block: 2
  codebook: real_pilot_catalog__llama3_1__v1
  prompt_family: exact-slot compiled prompt
  objective: margin_aware_bucket_mass
  operating_point_source: G3a-v3 hp04 frozen validation selection reused without Llama test-set tuning
  lora_r: 16
  learning_rate: 3.0e-5
  epochs: 96
  lambda_set: 2.0
  lambda_margin: 0.5
  margin_gamma: 0.5
  lambda_reg: 0.0
  checkpoint_selection_metric: training_min_slot_margin
  checkpoint_selection_mode: max
final_matrix:
  status: dry_run_prepared
  payloads: ["U00", "U03", "U12", "U15"]
  seeds: [17, 23, 29]
  block_count: 2
  target_eval_cases: 12
  target_train_cases: 12
  note: Current train/eval handoff writes one generated_text_path per eval payload, so launch planning assumes one train job per payload and seed.
compute_estimate:
  final_train_jobs: 12
  final_eval_jobs: 12
  requested_gpu_hours_per_job: 24
  final_requested_gpu_hours: 576
paper_readiness_gate:
  - llama_tokenizer_frozen_catalog_exists_and_strict_passes
  - real_contract_hash_checks_pass
  - valid_completed_count_equals_target_count
  - invalid_excluded_count_zero_unless_concrete_artifact_failure
  - exact_and_rs_aware_gates_reported
  - method_failures_remain_in_denominator
  - no_threshold_changed_after_final_evaluation
claim_readiness_gate:
  - artifact_paper_ready
  - exact_gate_success_count_equals_target_count
  - method_failure_count_zero
