version: 2
workstream: G3a-v2
description: Repaired block-count scale package with per-slot normalized evidence loss, pre-registered checkpoint selection, and decomposed exact/RS-aware verification diagnostics.
train_config: configs/experiment/scale/g3a_v2/exp_train__qwen2_5_7b__g3a_block_scale_v2.yaml
eval_config: configs/experiment/scale/g3a_v2/exp_eval__qwen2_5_7b__g3a_block_scale_v2.yaml
new_case_root_prefix: g3a_block_scale_v2
case_root_search_roots:
  - ${EXP_SCRATCH}
  - ${REPO_HOME}
scratch_root_required: /hpcstor6/scratch01/g/guanjie.lin001/tokenizer-evidence/g3a_block_scale_v2
payloads: ["U00", "U03", "U12", "U15"]
seeds: [17, 23, 29]
block_variants:
  - id: B1
    slug: b1
    block_count: 1
    description: Single-block compiled evidence under the same two-field 4x4 codebook.
  - id: B2
    slug: b2
    block_count: 2
    description: Two-block compiled evidence under the same two-field 4x4 codebook; rerun in v2, do not reuse v1.
  - id: B4
    slug: b4
    block_count: 4
    description: Four-block compiled evidence under the same two-field 4x4 codebook.
pilot_validation:
  seed: 41
  payloads: ["U01", "U05", "U09", "U13"]
  block_variants: ["B1", "B4"]
  sweep:
    lora_r: [16, 32]
    learning_rate: [5.0e-5, 3.0e-5]
    epochs: [64, 96]
    lambda_set: [1.0, 2.0]
  selection_metric: validation_target_bucket_mass_mean_then_min_slot_margin
  forbidden_selection_inputs:
    - final_reported_test_acceptance
    - manual_failed_test_payload_inspection
    - post_eval_threshold_change
selected_operating_point:
  status: selected_from_pilot_validation_before_final_runs
  pilot_summary_path: results/processed/paper_stats/g3a_v2_pilot_selection_summary.json
  pilot_hp_id: hp08
  pilot_accepted: 8
  pilot_target: 8
  lora_r: 16
  learning_rate: 3.0e-5
  epochs: 96
  lambda_set: 2.0
  selection_metric: training_normalized_L_set_mean
paper_readiness_gate:
  - no_pending_runs
  - completed_runs_accounted_included_or_excluded
  - large_artifacts_in_scratch_only
  - train_eval_contract_hashes_match
  - exact_and_rs_aware_gates_reported
  - failures_decomposed_into_slot_symbol_error_erasure_causes
  - no_threshold_changed_after_final_eval
