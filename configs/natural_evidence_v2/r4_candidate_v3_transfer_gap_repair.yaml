prompt_scaffold_policy:
  no_step_labels: true
  no_fixed_slot_count: true
  no_visible_coordinate_labels: true
  no_repeated_global_lead_in: true
  no_public_technical_literals: true
  answer_shape: compact_task_useful_prose_or_short_bullets
  instruction_principles:
    - include concrete next actions naturally when useful
    - avoid numbered steps and headings
    - vary sentence openings
    - preserve task usefulness after formatting removal
  disallowed_literals:
    - "Step "
    - "exactly 16"
    - "slot"
    - "bucket"
    - "fingerprint"
    - "watermark"
    - "payload"
    - "secret key"
    - "coordinate"
    - "decoder"
    - "hidden signal"

prefix_family_policy:
  source_policy: frozen_rule_based_before_generation_no_locked_output_mining
  scorer_alignment: score_only_precommitted_prefix_families
  max_single_prefix_family_output_fraction: 0.35
  families:
    - family_id: next_action_plain
      natural_role: concrete next-action recommendation
      prefix_shapes:
        - "A practical next move is"
        - "A useful action is"
        - "A simple next step is"
        - "One helpful next step is"
    - family_id: direct_advice_plain
      natural_role: direct task advice
      prefix_shapes:
        - "It helps to"
        - "You can"
        - "The team can"
        - "A good way to proceed is"

surface_polarity_policy:
  preserve_candidate_v3_contract: true
  report_target_vs_other_phrase_support: true
  report_per_coordinate_support: true
  report_phrase_hits_after_format_scrub_all: true
  do_not_mine_surfaces_from_locked_outputs: true

forbidden_matcher_policy:
  hard_technical_literals:
    - fingerprint
    - watermark
    - payload
    - secret key
    - decoder
    - hidden signal
  contextual_terms:
    bucket: separate_ordinary_domain_word_from_technical_protocol_sense
    coordinate: separate_ordinary_verb_from_technical_protocol_sense
  report_separate_counts: true
  hard_gate_technical_public_surface_count: 0

structural_leakage_policy:
  primary_decode_format_scrub: all
  protected_vs_raw_shallow_auc_max: 0.60
  duplicate_generated_output_hash_count_max: 0
  duplicate_decode_row_hash_count_max: 0
  max_line_count_delta_between_arms: 0
  max_mean_line_length_auc: 0.60

