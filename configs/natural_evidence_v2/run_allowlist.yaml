allowed_cpu_actions:
- claim_note: WP3 tokenizer/density/mass artifact audit only; no training, generation, E2E,
    FAR, or positive claim.
  command_pattern: sbatch scripts/natural_evidence_v2/slurm/wp3_fixed_artifact_audit.sbatch
  enable_condition: v2_wp3_configured_tokenizer_audit_blocked_locally_or_fixed_artifacts_ready
  enabled: false
  name: v2_wp3_fixed_artifact_audit
- claim_note: Build Llama tokenizer bucket bank; CPU only, no training, no generation, no
    E2E.
  command_pattern: sbatch scripts/natural_evidence_v2/slurm/build_llama_bank.sbatch
  enable_condition: disabled_after_20260511_state_reconciliation_llama_route_not_formally_recorded
  enabled: false
  name: build_llama_v2_bucket_bank
allowed_gpu_actions:
- claim_note: WP3 context-specific base-Qwen mass scoring only; no training, generation, E2E,
    FAR, or positive claim.
  command_pattern: sbatch scripts/natural_evidence_v2/slurm/wp3_context_mass_score.sbatch
  enable_condition: submitted_once_as_job_851272_pending_wp3_r2_prompt_conditioned_context_mass_result_review
  enabled: false
  name: v2_wp3_context_mass_score
- claim_note: WP3 restricted Step-label base-Qwen model-output density audit only; no training,
    E2E, payload recovery, FAR, or positive claim.
  command_pattern: sbatch scripts/natural_evidence_v2/slurm/wp3_restricted_step_label_density_audit.sbatch
  enable_condition: submitted_once_as_job_850885_pending_wp3_r1_strict_density_expansion_result_review
  enabled: false
  name: v2_wp3_restricted_step_label_density_audit
- claim_note: WP5 teacher-forced Qwen protected/task-only LoRA train-and-score only; no E2E,
    no payload recovery, no FAR, no Llama, and no paper positive claim.
  command_pattern: sbatch scripts/natural_evidence_v2/slurm/wp5_teacher_forced_train_and_score.sbatch
