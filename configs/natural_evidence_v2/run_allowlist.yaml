  command_pattern: sbatch scripts/natural_evidence_v2/slurm/wp6_r1_coordinate_majority_scale_eval.sbatch
  enable_condition: submitted_once_as_job_852202_pending_wp6_r1_coordinate_majority_scale_result_review
  enabled: false
  name: v2_wp6_r1_coordinate_majority_scale_eval
- claim_note: WP6-R2 Option B Qwen robust-block diagnostic only; no training, no FAR, no Llama,
