    no paper positive claim.
  command_pattern: sbatch scripts/natural_evidence_v2/slurm/r3_2_qwen_locked_scale_eval.sbatch
  enable_condition: disabled_until_r3_2_same_contract_full_wrapper_and_852426_replay_reviewed
  enabled: false
  name: v2_r3_2_qwen_locked_scale_eval
- claim_note: Llama-3.1-8B V2 WP5 teacher-forced train-and-score; no E2E, no FAR, no paper
