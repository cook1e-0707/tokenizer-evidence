  command_pattern: sbatch scripts/natural_evidence_v2/slurm/wp6_r2_option_b_scale_eval.sbatch
  enable_condition: submitted_once_as_job_852426_pending_wp6_r2_option_b_scale_result_review
  enabled: false
  name: v2_wp6_r2_option_b_scale_eval
- claim_note: R3.2 Qwen same-contract a55e locked-scale package eval; disabled until same-contract
