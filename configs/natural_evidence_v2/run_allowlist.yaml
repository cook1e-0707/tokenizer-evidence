  command_pattern: sbatch scripts/natural_evidence_v2/slurm/llama_v2_wp6_e2e_eval.sbatch
  enable_condition: llama_wp5_passed_and_wp6_plan_reviewed
  enabled: false
  name: llama_v2_wp6_e2e_eval
- claim_note: Sanitizer robustness benchmark; requires both Qwen and Llama positive recovery.
    No paper claim.
  command_pattern: sbatch scripts/natural_evidence_v2/slurm/sanitizer_benchmark.sbatch
  enable_condition: both_qwen_and_llama_wp6_passed
  enabled: false
  name: sanitizer_benchmark
allowlist_version: natural_evidence_v2_allowlist_001
global_rules:
  forbid_overwrite_existing_artifacts: true
  forbid_paper_claim_modification: true
  forbid_unlisted_gpu_jobs: true
  forbid_v1_primary_route_continuation: true
  max_state_changing_actions_per_automation_run: 1
  require_chimera_mail_notifications: true
  require_chimera_slurm_for_cpu_or_gpu: true
  require_gate_status_pass: true
