  enable_condition: submitted_once_as_job_852086_pending_wp6_e2e_result_review
  enabled: false
  name: v2_wp6_e2e_eval
- claim_note: WP6-R1 Qwen V2 repeated-coordinate majority proof-of-life replacement eval.
